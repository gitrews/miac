<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Шаг 2 — Работа регистратора</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0F1D2A;
  color: #fff;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.header {
  padding: 20px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid rgba(46,196,182,0.15);
}
.header h1 {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.back-link {
  color: #2EC4B6;
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: opacity 0.2s;
}
.back-link:hover { opacity: 0.7; }
.container {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.scene {
  position: relative;
  max-width: 1200px;
  width: 100%;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}
.mis-bg {
  width: 100%;
  display: block;
  border-radius: 16px;
}
.widget-stage {
  position: absolute;
  top: 24px;
  right: 24px;
  width: 340px;
  height: 220px;
  cursor: pointer;
  overflow: hidden;
  border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.35);
  background: rgba(0,0,0,0.2);
}
.widget-stage::after {
  content: 'Нажмите для смены состояния';
  position: absolute;
  bottom: -28px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  color: rgba(255,255,255,0.45);
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.3s;
}
.widget-stage:hover::after { opacity: 1; }
.widget-frame {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
  border-radius: 12px;
  opacity: 0;
  transform: translateX(-100%);
  transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease;
}
.widget-frame.active {
  opacity: 1;
  transform: translateX(0);
}
.widget-frame.exit-right {
  opacity: 0;
  transform: translateX(100%);
}
.step-badge {
  position: absolute;
  top: 24px;
  left: 24px;
  background: #2EC4B6;
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  padding: 6px 14px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
@media (max-width: 768px) {
  .widget-stage {
    width: 200px;
    height: 130px;
    top: 12px;
    right: 12px;
  }
  .header h1 { font-size: 16px; }
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
</head>
<body>
<div class="header">
  <h1>Работа регистратора</h1>
  <a href="/miac/" class="back-link">← На главную</a>
</div>
<div class="container">
  <div class="scene">
    <div class="step-badge">Шаг 2</div>
    <img src="/miac/images/step2-mis-bg.png" alt="Экран МИС" class="mis-bg">
    <div class="widget-stage" id="widgetStage" title="Нажмите для смены состояния">
      <img src="/miac/images/step2-widget-1.jpg" class="widget-frame active" id="frame0" alt="Ожидают вызова">
      <img src="/miac/images/step2-widget-2.jpg" class="widget-frame" id="frame1" alt="Вызваны">
      <img src="/miac/images/step2-widget-3.jpg" class="widget-frame" id="frame2" alt="В обслуживании">
    </div>
  </div>
</div>
<script>
(function() {
  const stage = document.getElementById('widgetStage');
  const frames = [
    document.getElementById('frame0'),
    document.getElementById('frame1'),
    document.getElementById('frame2')
  ];
  let current = 0;
  let isAnimating = false;

  stage.addEventListener('click', function() {
    if (isAnimating) return;
    isAnimating = true;

    const outgoing = frames[current];
    current = (current + 1) % frames.length;
    const incoming = frames[current];

    // Старый уходит вправо
    outgoing.classList.remove('active');
    outgoing.classList.add('exit-right');

    // Новый появляется слева
    incoming.classList.remove('exit-right');
    incoming.classList.add('active');

    setTimeout(function() {
      outgoing.classList.remove('exit-right');
      isAnimating = false;
    }, 500);
  });
})();
</script>
</body>
</html>
