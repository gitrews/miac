<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ямальский чек-ап</title>
    <link rel="icon" type="image/svg+xml" href="./images/yamal-checkup-logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
    <script type="module" crossorigin src="./assets/index-C9BVKr4B.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-BImZH985.css">
    <link rel="stylesheet" href="./css/overrides.css">
    <script>
      if (new URLSearchParams(window.location.search).get('embedded') === '1') {
        document.documentElement.classList.add('miac-embedded');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>

    <!-- Placeholder overlay for direct hash links (#/step/2 … #/step/10) -->
    <div id="step-placeholder-overlay" style="display:none;position:fixed;inset:0;z-index:9999;overflow-y:auto;background:linear-gradient(180deg,#F7FAFC 0%,#EAF1F8 100%);font-family:'Inter',sans-serif;">
      <div style="max-width:960px;margin:0 auto;padding:40px 20px 56px;">
        <button onclick="history.back()" style="background:#fff;border:1px solid rgba(26,43,60,0.12);color:#1A2B3C;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:14px;margin-bottom:24px;display:inline-flex;align-items:center;gap:8px;transition:all 0.2s;box-shadow:0 6px 16px rgba(26,43,60,0.08);" onmouseover="this.style.background='#F7FAFC'" onmouseout="this.style.background='#fff'">← Назад к процессу</button>
        <div style="border:1px solid rgba(26,43,60,0.08);border-radius:28px;background:rgba(255,255,255,0.92);box-shadow:0 20px 40px rgba(26,43,60,0.12);padding:40px 28px 44px;">
          <div style="display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border-radius:999px;background:rgba(46,196,182,0.12);border:1px solid rgba(46,196,182,0.24);color:#2EC4B6;font-size:12px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:18px;">Заглушка</div>
          <h1 id="step-placeholder-title" style="font-size:30px;font-weight:700;color:#1A2B3C;margin-bottom:12px;">Шаг</h1>
          <p id="step-placeholder-copy" style="color:#4A5568;font-size:16px;line-height:1.55;max-width:780px;margin-bottom:28px;">Временный экран шага процесса.</p>
          <div style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px;">
            <div style="border-radius:20px;overflow:hidden;background:#fff;border:1px solid rgba(26,43,60,0.08);min-height:260px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;padding:24px;box-shadow:0 10px 24px rgba(26,43,60,0.06);">
              <div style="width:72px;height:72px;border-radius:18px;background:rgba(46,196,182,0.12);border:1px solid rgba(46,196,182,0.2);display:flex;align-items:center;justify-content:center;color:#2EC4B6;font-size:30px;font-weight:700;">1</div>
              <div style="color:#1A2B3C;font-size:16px;font-weight:600;text-align:center;">Макет экрана 1</div>
              <div style="color:#718096;font-size:14px;text-align:center;max-width:240px;">Здесь позже появится основной контент шага.</div>
            </div>
            <div style="border-radius:20px;overflow:hidden;background:#fff;border:1px solid rgba(26,43,60,0.08);min-height:260px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;padding:24px;box-shadow:0 10px 24px rgba(26,43,60,0.06);">
              <div style="width:72px;height:72px;border-radius:18px;background:rgba(255,177,90,0.12);border:1px solid rgba(255,177,90,0.2);display:flex;align-items:center;justify-content:center;color:#FFB15A;font-size:30px;font-weight:700;">2</div>
              <div style="color:#1A2B3C;font-size:16px;font-weight:600;text-align:center;">Макет экрана 2</div>
              <div style="color:#718096;font-size:14px;text-align:center;max-width:240px;">Пока используем заглушку, чтобы маршрут был доступен.</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal overlay for steps opened by clicking scheme cards (?step=X) -->
    <div id="step-modal-overlay" style="display:none;position:fixed;inset:0;z-index:9998;font-family:'Inter',sans-serif;">
      <div style="position:absolute;inset:0;background:rgba(247,250,252,0.78);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);"></div>
      <div style="position:relative;display:flex;flex-direction:column;width:100vw;height:100dvh;margin:0;overflow:hidden;border:0;border-radius:0;background:linear-gradient(180deg,rgba(255,255,255,0.98) 0%,rgba(247,250,252,0.96) 100%);box-shadow:none;animation:miacStepFullscreenIn 0.22s ease-out;">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px 18px;border-bottom:1px solid rgba(26,43,60,0.08);background:rgba(255,255,255,0.8);flex:0 0 auto;">
          <div style="display:flex;flex-direction:column;gap:4px;min-width:0;">
            <div id="step-modal-kicker" style="font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#2EC4B6;">Шаг 1</div>
            <div style="display:flex;align-items:center;gap:10px;min-width:0;flex-wrap:wrap;">
              <div id="step-modal-title" style="font-size:20px;font-weight:700;color:#1A2B3C;line-height:1.2;">Запись в регистратуру</div>
              <div id="step-modal-label" style="font-size:12px;font-weight:700;color:#E91E8C;background:rgba(233,30,140,0.1);border:1px solid rgba(233,30,140,0.18);border-radius:999px;padding:4px 10px;line-height:1;">ВнеОчереди</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:10px;flex:0 0 auto;">
            <button id="step-modal-close" type="button" style="appearance:none;display:inline-flex;align-items:center;justify-content:center;min-width:92px;border:1px solid rgba(26,43,60,0.14);background:#fff;color:#1A2B3C;border-radius:12px;padding:10px 16px;cursor:pointer;font-size:14px;font-weight:700;transition:all 0.2s;box-shadow:0 8px 16px rgba(26,43,60,0.06);">Закрыть</button>
            <button id="step-modal-prev" type="button" style="appearance:none;display:inline-flex;align-items:center;justify-content:center;min-width:92px;border:1px solid rgba(26,43,60,0.14);background:#fff;color:#1A2B3C;border-radius:12px;padding:10px 16px;cursor:pointer;font-size:14px;font-weight:700;transition:all 0.2s;box-shadow:0 8px 16px rgba(26,43,60,0.06);">Назад</button>
            <button id="step-modal-next" type="button" style="appearance:none;display:inline-flex;align-items:center;justify-content:center;min-width:92px;border:1px solid rgba(26,43,60,0.14);background:#fff;color:#1A2B3C;border-radius:12px;padding:10px 16px;cursor:pointer;font-size:14px;font-weight:700;transition:all 0.2s;box-shadow:0 8px 16px rgba(26,43,60,0.06);">Дальше</button>
          </div>
        </div>
        <div style="position:relative;flex:1 1 auto;background:#F7FAFC;padding:0 28px 28px;">
          <iframe id="step-modal-frame" title="Шаг процесса" style="display:block;width:100%;height:100%;border:0;background:#F7FAFC;border-radius:0 0 20px 20px;"></iframe>
        </div>
      </div>
    </div>

    <script src="./js/scroll-utils.js"></script>
    <script src="./js/step-placeholder.js"></script>
    <script src="./js/step-modal.js"></script>
  </body>
</html>
